const schedule = [

  { time: "12:30", duration: "15 min", label: "Pausa vera", detail: "Stacca dallo schermo completamente. Esci sul balcone o in giardino. Niente scroll. Anche solo guardare fuori 10 minuti resetta il focus.", category: "corpo" },
  { time: "12:45", duration: "45 min", label: "Pranzo", detail: "Pasto completo con proteine. Puoi mettere un episodio di anime o un podcast — qui va benissimo. È il tuo break mentale di mezzo giorno.", category: "corpo" },
  { time: "13:30", duration: "30 min", label: "Digest & Micro-task", detail: "Non iniziare lavoro pesante subito dopo pranzo. Usa questo slot per cose leggere: email, tutorial n8n passivi, aggiornare checklist, ricerca keyword SEO.", category: "lavoro" },
  { time: "14:00", duration: "1h30", label: "Blocco Lavoro Secondario", detail: "Secondo blocco produttivo. Meno intenso del mattino ma comunque mirato. Se il mattino hai lavorato sul sito, usa questo per imparare n8n o viceversa.", category: "lavoro" },
  { time: "15:30", duration: "15 min", label: "Pausa caffè", detail: "Ultimo caffè della giornata. Oltre questo orario interferisce col sonno, specie durante il tapering.", category: "corpo" },
  { time: "15:45", duration: "45 min", label: "Blocco Apprendimento", detail: "Studia qualcosa di specifico: un tutorial n8n, un video su SEO tecnico, documentazione Vercel. Input puro. Il cervello assorbe bene a quest'ora.", category: "impara" },

  { time: "18:00", duration: "1h", label: "Tempo libero / Decompressione", detail: "Nessun task. Rocket League, musica, camminata extra, chiamata con un amico. Questo slot non è negoziabile — zona franca prima di sera.", category: "libero" },

  { time: "20:00", duration: "30 min", label: "Review & Domani", detail: "5 minuti: cosa ho completato oggi? 5 minuti: cosa faccio domani? Poi chiudi tutto. Non riaprire il lavoro. La sera è tua.", category: "mente" },
  { time: "20:30", duration: "2h", label: "Anime / Serata", detail: "6–7 episodi, come concordato. Oppure Rocket League con un amico (max 1h). Riposo guadagnato — non è tempo perso.", category: "libero" },
  { time: "23:00", duration: "30 min", label: "Wind down", detail: "Luci basse, niente schermo se riesci. L'ottavo episodio per addormentarti va bene. Stesso orario ogni notte: il cervello si ricalibra sulla routine.", category: "corpo" },

const categories = {

  mente: { color: "#a07cb8", label: "Mente" },

];

      <div style={{ padding: "16px 24px", borderBottom: "1px solid #0e0e12", display: "flex", gap: "8px", flexWrap: "wrap", alignItems: "center" }}>

        {Object.entries(categories).map(([key, val]) => (
          <button key={key} onClick={() => setActiveFilter(activeFilter === key ? null : key)} style={{ background: activeFilter === key ? `${val.color}18` : "transparent", border: `1px solid ${activeFilter === key ? val.color : "#1e1e24"}`, borderRadius: "2px", padding: "5px 12px", fontFamily: "'JetBrains Mono', monospace", fontSize: "9px", color: activeFilter === key ? val.color : "#444", letterSpacing: "0.1em", cursor: "pointer" }}>

          </button>

      </div>

      <div>
        {filtered.map((slot, i) => {
          const cat = categories[slot.category];
          const isSelected = selected === i;
          return (
            <div key={i} className="slot" onClick={() => setSelected(isSelected ? null : i)} style={{ borderLeft: `3px solid ${isSelected ? cat.color : "transparent"}`, background: isSelected ? `${cat.color}08` : "transparent", borderBottom: "1px solid #0c0c10" }}>
              <div style={{ display: "flex", alignItems: "center", gap: "0", padding: "16px 16px 16px 20px" }}>
                <div style={{ minWidth: "58px" }}>
                  <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "12px", color: isSelected ? cat.color : "#333" }}>{slot.time}</span>
                </div>
                <div style={{ minWidth: "60px" }}>
                  <span style={{ fontFamily: "'JetBrains Mono', monospace", fontSize: "9px", color: "#252530" }}>{slot.duration}</span>
                </div>
                <div style={{ minWidth: "20px", display: "flex", alignItems: "center", justifyContent: "center" }}>
                  <div style={{ width: "5px", height: "5px", borderRadius: "50%", background: cat.color, opacity: isSelected ? 1 : 0.35 }} />
                </div>
                <div style={{ flex: 1 }}>
                  <span style={{ fontFamily: "'Playfair Display', serif", fontSize: slot.highlight ? "16px" : "14px", color: isSelected ? "#e2ddd6" : slot.highlight ? "#bbb" : "#777", fontWeight: slot.highlight ? 600 : 400 }}>

                <div style={{ marginRight: "4px" }}>

                <div style={{ color: "#2a2a32", fontSize: "9px", fontFamily: "monospace", marginLeft: "8px" }}>{isSelected ? "▲" : "▼"}</div>
              </div>
              {isSelected && (
                <div style={{ padding: "0 20px 20px 24px" }}>
                  <p style={{ fontFamily: "'Georgia', serif", fontSize: "13px", color: "#666", lineHeight: 1.75, maxWidth: "560px" }}>{slot.detail}</p>
                </div>
              )}
            </div>
          );

            </div>
          ))}

ReactDOM.render(<App />, document.getElementById("root"));
